api:
  base_url: "https://api.football-data.org/v4"
  key: "7768092fc3bb4d778ab8abf7f05f58c4"
  rate_limit_seconds: 6  # Free tier: 10 requests/minute

database:
  path: "database/database.db"

elo:
  k_factor: 40
  home_advantage: 65
  initial_rating: 1000

expected_goals:
  base_lambda: 1.40        # Calibrated on finished WC matches (walk-forward)
  elo_sensitivity: 0.001   # How much Elo difference affects xG (Elo-only fallback)
  min_matches_for_stats: 1 # Use stats model once a team has played this many matches

poisson:
  max_goals: 6

simulation:
  iterations: 100000

competition:
  winner_points: 2
  goal_difference_points: 4
  exact_score_points: 6
  # Group (qualifying) phase scoring. Points double in the knockout phase
  # via knockout_multiplier (group 1/2/3 -> knockout 2/4/6).
  group_stage_winner_points: 1
  group_stage_goal_difference_points: 2
  group_stage_exact_score_points: 3
  knockout_multiplier: 2
  # Matches on/after this date count as knockout (points doubled) unless
  # score.md explicitly labels them otherwise.
  knockout_start_date: "2026-06-28"

competitions:
  - code: "WC"
    name: "FIFA World Cup"
  - code: "EC"
    name: "UEFA European Championship"

recommendations:
  top_n: 5
