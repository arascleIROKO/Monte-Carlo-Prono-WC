api:
  base_url: "https://api.football-data.org/v4"
  key: ""  # Set via FOOTBALL_API_KEY env var / Streamlit secret — never commit a real key.
  rate_limit_seconds: 6  # Free tier: 10 requests/minute

database:
  path: "database/database.db"

elo:
  k_factor: 40
  home_advantage: 65
  home_advantage_neutral: 0
  initial_rating: 1000
  mov_enabled: true
  host_nations: []
  host_advantage: 0

expected_goals:
  base_lambda: 1.40
  elo_sensitivity: 0.001
  min_matches_for_stats: 2
  full_stats_matches: 5.0
  half_life_days: 365
  competition_weights:
    WC: 1.0
    EC: 0.6
  lambda_min: 0.3
  lambda_max: 6.0
  defense_floor: 0.1

poisson:
  max_goals: 6
  dixon_coles_rho: 0.0

simulation:
  iterations: 100000
  extra_time_fraction: 0.37

competition:
  winner_points: 2
  goal_difference_points: 4
  exact_score_points: 6
  # Group (qualifying) phase scoring. Points double in the knockout phase
  # via knockout_multiplier (group 1/2/3 -> knockout 2/4/6).
  group_stage_winner_points: 1
  group_stage_goal_difference_points: 2
  group_stage_exact_score_points: 3
  knockout_multiplier: 2
  # Matches on/after this date count as knockout (points doubled) unless
  # score.md explicitly labels them otherwise.
  knockout_start_date: "2026-06-28"

competitions:
  - code: "WC"
    name: "FIFA World Cup"
    season: 2026
  - code: "EC"
    name: "UEFA European Championship"
    season: 2024

recommendations:
  top_n: 5
